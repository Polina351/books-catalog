<mat-card class="book-card">
  <mat-card-header>
    <mat-card-title>{{ book.title }}</mat-card-title>
    <mat-card-subtitle>{{ book.author }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-actions>
    <button mat-button
            color="primary"
            [routerLink]="['/details']"
            [state]="{ book: {
              title: book.title,
              author: book.author,
              description: book.description
            } }">Подробнее</button>
  </mat-card-actions>
</mat-card>
